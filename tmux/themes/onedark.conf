set -g status-position bottom
set -g status-style "bg=#282c34,fg=#abb2bf"

set -g status-left "#[fg=#98c379,bold] #S "
set -g status-right "#[fg=#61afef]#{user}@#{host} #[fg=#3e4452]| #[fg=#98c379]%H:%M #[fg=#e5c07b]%Y-%m-%d"

set -g window-status-format " #I:#W "
set -g window-status-style "fg=#abb2bf,bg=#282c34"

set -g window-status-current-format " #I:#W "
set -g window-status-current-style "fg=#282c34,bg=#61afef,bold"

set -g window-status-separator ""

set -g pane-border-style "fg=#3e4452"
set -g pane-active-border-style "fg=#61afef"

set -g message-style "bg=#61afef,fg=#282c34"
set -g mode-style "bg=#61afef,fg=#282c34"
